"sector_fit_score": 100.0, "tags": ["climate", "government", "public_health"], "category_normalized": [], "penalties": []}, {"source_type": "nyc", "source_name": "NYC City Record", "title": "FPHNY Grant Development and Fundraising", "source_url": null, "external_id": "20260512028", "buyer_name": "Health and Mental Hygiene", "buyer_type": "government", "summary": "Pursuant to Section 3-05 of the New York City Procurement Policy Board Rules, the Department of Health and Mental Hygiene (DOHMH) intends to enter into negotiations for a five-year agreement with Fund for Public Health in New York, Inc. (FPHNY) for the purchase of grant acquisition, fundraising, grant management and project management needs. FPHNY was created in 2002 as an independent nonprofit organization to partner closely with NYC DOHMH to further its mission of improving the health of all New Yorkers. FPHNY contributes to the advancement of public health in NYC by: a) soliciting funds for both project and general support from public and private funding sources and donors who would or could not ordinarily support government initiatives, and; b) by providing a vehicle for effective administration of grant funds for pilot projects or time-sensitive grant programs. FPHNY is the only non-profit organization that is solely dedicated to soliciting funding, facilitating partnerships, and providing administrative support to advance DOHMH's public health priorities. As such, it plays a unique role and does not duplicate the efforts of other agencies or organizations. DOHMH has determined that FPHNY, is the only viable vendor to provide these services because FPHNY's unique ability to generate strong public and private sector support otherwise inaccessible to NYC DOHMH, bring additional partners and needed funds to NYC DOHMH projects, and greatly impact NYC DOHMH projects with such additional support. Further, FPHNY plays a unique role for NYC DOHMH, with FPHNY's significant and flexible administrative capacity augmenting NYC DOHMH's ability to meet rigorous funder requirements. FPHNY' s ability to raise funds and facilitate partnerships for NYC DOHMH, coupled with its ability to efficiently administer such relationships, is invaluable to many NYC DOHMH programs and cannot be achieved by any other contractor. Any vendor that believes it can legally provide these services is invited to submit an Expression of Interest directly to this RFI- EPIN 81626Y0839 by the due date and time. If you need additional assistance with PASSPort, please contact the MOCS Service Desk at https://mocssupport.atlassian.net/servicedesk/customer/portal/8.", "full_text": null, "category_raw": "Intent to Award", "location": null, "country": "United States", "posted_date": "2026-05-26", "deadline": "2026-05-26", "status": "open", "budget_min": null, "budget_max": null, "currency": null, "documents_url": [], "contact_email": null, "id": "nyc:20260512028", "content_hash": "5ef944872ff180382d4eb6f57f37a4e8b431c13b8e5adc8db7858f6a9e3363f2", "relevance_score": 40.0, "design_fit_score": 0.0, "sector_fit_score": 100.0, "tags": ["government", "nonprofit", "public_health"], "category_normalized": [], "penalties": []}, {"source_type": "nyc", "source_name": "NYC City Record", "title": "School of Journalism - Whisper Room Renovation", "source_url": null, "external_id": "20260529005", "buyer_name": "City University", "buyer_type": "government", "summary": "For more information, please visit our website at www.cuny.edu/cunybuilds. Proposals should be submitted to Proposals@cuny.edu", "full_text": null, "category_raw": "Solicitation", "location": null, "country": "United States", "posted_date": "2026-06-15", "deadline": "2026-06-15", "status": "open", "budget_min": null, "budget_max": null, "currency": null, "documents_url": [], "contact_email": null, "id": "nyc:20260529005", "content_hash": "ef021784d79ae1a487144d0fd0981254a3ab601bd173849e2c6daacf7421c663", "relevance_score": 40.0, "design_fit_score": 0.0, "sector_ ng a Request for Proposals (RFP) to identify qualified Fund Administrators to manage the Manhattan Cruise Terminal Community Fund (\u001aMCTCF\u001a) designed to support projects identified by community members and may include, but are not limited to, environmental stewardship, public realm improvements, and workforce development initiatives in the Hell\u001as Kitchen. The selected Fund Administrator will be responsible for leading and managing transparent project solicitation and selection processes, overseeing Fund disbursement, implementing robust monitoring and evaluation frameworks, and memorializing funding priorities in collaboration with local stakeholders all through an inclusive community engagement process. The MCTCF is financed through a $1 per passenger fee collected from cruise lines operating under exclusive berthing agreements. NYCEDC anticipates approximately $2 million in total funds for MCTCF by the end of calendar year 2026, with disbursement amounts expected to range between $700,000 annually. The administration fee for the selected organization will be sourced from a portion of the MCTCF Funds. No additional funding sources are available for this solicitation. NYCEDC will accept proposals from a variety of institutions, including, but not limited to nonprofit organizations, community foundations, certified community development financial institutions (CDFIs), certified community development entities (CDEs), local business improvement districts (BIDs), and independent consultants with a demonstrated history of managing community funds and engaging local stakeholders. NYCEDC plans to select one organization on the basis of factors stated in the RFP which include but are not limited to: the respondent\u001as cost proposal, experience and qualifications of the respondent, proposed outcomes, and overall proposal quality. An optional virtual informational session will be held on Tuesday, June 23rd at 10:00 A.M. Those who wish to attend should RSVP by using the RSVP web form available at https://edc.nyc/rfps on or before Monday, June 22nd, 2026. Respondents may submit questions and/or request clarifications from NYCEDC no later than later than 5pm on Wednesday, August 12th, 2026. Questions regarding the subject matter of this RFP should be directed to the Q&A web form available at edc.nyc/RFPs. Answers to all questions will be posted by August 18th, 2026, to https://edc.nyc/rfps Questions regarding the subject matter of this RFP will not be accepted after 5pm on Wednesday, August 12th, 2026, however, technical questions pertaining to downloading and submitting proposals to this RFP may be directed to RFPREQUEST@edc.nyc on or before Thursday, September 3rd, 2026. Detailed submission guidelines and requirements are outlined in the RFP, available as of Tuesday, June 16th, 2026. To download a copy of the solicitation documents please visit https://edc.nyc/rfps. RESPONSES ARE DUE NO LATER THAN Thursday, September 3rd 2026 at 4:00 P.M.. Please click the link in the \u001aDeadlines\u001a section of this project\u001as web page (which can be found on https://edc.nyc/rfps) to electronically upload a proposal for this solicitation. Please upload your response as a single .zip file, labeled with your company name and the title of this RFP.", "full_text": null, "category_raw": "Solicitation", "location": null, "country": "United States", "posted_date": "2026-06-16", "deadline": "2026-06-16", "status": "open", "budget_min": null, "budget_max": null, "currency": null, "documents_url": [], "contact_email": null, "id": "nyc:20260609058", "content_hash": "18b7d95ae7ce0b24b480c757236674503c4fd59f0d8c320bee85ea8c3628c9c0", "relevance_score": 40.0, "design_fit_score": 0.0, "sector_fit_score": 100.0, "tags": ["climate", "government", "nonprofit"], "category_normalized": [], "penalties": []}, {"source_type": "nyc", "source_name": "NYC City Record", "title": "00225S0001-Not-for-Profit Development Renewal #1", "source_url": null, "exte ": "Concession Opportunities in NYC Parks", "source_url": null, "external_id": "20260601031", "buyer_name": "Parks and Recreation", "buyer_type": "government", "summary": "The New York City Department of Parks & Recreation (\u001aParks\u001a) is seeking to add to its solicitation mailing lists the names of individuals and businesses that are interested in operating concessions in City parks. Currently, over 400 different concessions operate throughout the five boroughs, including but not limited to cafés, restaurants, mobile food units, farmers\u001a markets, sports facilities, amusement parks, arts and crafts markets, T-shirt and souvenir stands, marinas, carousels, driving ranges, golf courses, tennis facilities, ice rinks, newsstands, parking lots, stables, and Christmas tree stands. If you\u001are interested in learning more about Parks\u001a concession opportunities and/or would like to be added to Parks\u001a solicitation mailing lists so that you receive notice of when new opportunities become available, please contact Parks\u001a Concession Division by emailing Concessions@parks.nyc.gov. Alternatively, you can just go to the link below and fill in the online form: https://www.nycgovparks.org/opportunities/concessions/solicitation-mailing-lists. Please direct any questions or comments you may have to Andrew Coppola, Senior Project Manager, by phone at 212-360-3454 or via email at andrew.coppola@parks.nyc.gov.", "full_text": null, "category_raw": "Vendor List", "location": null, "country": "United States", "posted_date": "2026-06-09", "deadline": "2026-06-15", "status": "open", "budget_min": null, "budget_max": null, "currency": null, "documents_url": [], "contact_email": null, "id": "nyc:20260601031", "content_hash": "2b0a9a65649435125e8a98acaf08d2e50a578e4d201c675d1625901f413b8eab", "relevance_score": 34.0, "design_fit_score": 0.0, "sector_fit_score": 85.0, "tags": ["arts_culture", "government"], "category_normalized": [], "penalties": []}, {"source_type": " "summary": "New York City Housing Authority (\u001aNYCHA\u001a) seeks proposals from U.S. Environmental Protection Agency accredited training providers firms to provide NYCHA with the Development and Implementation of Renovation, Repair and Painting Training Courses as detailed more fully within Section II of this RFP. A non-mandatory Proposers\u001a conference (\u001a Proposers\u001a Conference \u001a) will be hosted online via Microsoft Teams on June 9, 2026, at 10:00 a.m. Although attendance is not mandatory at the Proposers\u001a Conference, it is strongly recommended that all interested Proposers attend, and that Proposers thoroughly review bid documents in advance of the meeting. To participate in the Pre-Bid Conference, please follow the instructions below: Option 1: Copy and paste the below into your browser. https://teams.microsoft.com/meet/230485553497980?p=Wt5zENGBGPJVg3PKrG Meeting ID: 230 485 553 497 980 Passcode: pt2Tj9Yf Option 2 : Call in (audio only) +1 646-838-1534,, 230485553497980 # Phone Conference ID: 230 485 553 497 980 # Option 3: Access the document \u001aTEAMS Meeting Link RFP 518144\u001a and click on the embedded link to join. Proposals must be successfully submitted into iSupplier in final form no later than 2:00 P.M. on July 7, 2026 (the \u001aProposal Submission Deadline\u001a). Proposals which are saved in iSupplier as a \u001adraft\u001a but not successfully submitted will not be considered. Proposers should refer to Section IV(B) of this RFP for details on Proposal submission requirements. The anticipated award date of the Agreement(s) to the Selected Proposer(s) is on or about October 2026. All times stated above are Eastern Standard Time (EST). Interested firms are invited to obtain a copy of the RFP on NYCHA\u001as website. To conduct a search for the RFP number; vendors are instructed to open the link: http://www1.nyc.gov/site/nycha/business/isupplier-vendor-registration.page Proposers should refer to Section IV(2) of this RFP for details on Proposal packaging and submission requirements. Proposer shall electronically upload the Cost Proposal in Excel and a single .pdf containing ALL components of the Proposal into iSupplier by 2:00 P.M. on the Proposal Submission Deadline. NYCHA will NOT accept hardcopy Proposals. The Proposal shall not include embedded documents or proprietary file extensions. NYCHA will not accept Proposals via e-mail, fax, or mail. Instructions for registering for iSupplier can be found at http://www1.nyc.gov/site/nycha/business/isupplier-vendor-registration.page After Proposer\u001as register for iSupplier, it typically takes 24 to 72 hours for Proposer\u001as iSupplier profile to be approved. It is Proposer\u001as sole responsibility to complete iSupplier registration and submit its Proposal before the Proposal Submission Deadline. NYCHA is not responsible for delays caused by technical difficulty or caused by any other occurrence.", "full_text": null, "category_raw": "Solicitation", "location": null, "country": "United States", "posted_date": "2026-06-02", "deadline": "2026-06-02", "status": "open", "budget_min": null, "budget_max": null, "currency": null, "documents_url": [], "contact_email": null, "id": "nyc:20260519002", "content_hash": "8022645573cb8b1361ec302fbe2e63ae27f409f079a1d90f8f88f342da5f0ef7", "relevance_score": 32.0, "design_fit_score": 0.0, "sector_fit_score": 80.0, "tags": ["climate", "government"], "category_normalized": [], "penalties": []}, {"source_type": "nyc", "source_name": "NYC City Record", "title": "The Development of the Public Health Community Leadership Sector", "source_url": null, "external_id": "20260527019", "buyer_name": "Health and Mental Hygiene", "buyer_type": "government", "summary": "The New York City (NYC) Department of Health and Mental Hygiene (\u001aNYC Health Department\u001a or the \u001aAgency\u001a) is seeking up to six (6) qualified Contractors who will each lead a Community Emergency Network (\u001aCEN\u001a) that will enhance the Agency\u001as ability to mitigate the public health impacts of emergencies in NYC. The CENs will be networks that use models inspired by Voluntary Organizations Active in Disaster (VOAD), such as Community Organizations Active in Disaster (COAD) and Long-Term Recovery Groups (LTRG). They will demonstrate focus on hyperlocal preparedness and response planning within their community (e.g. information sharing, identifying needs and gaps in services and offering a structure for community-based emergency collaboration during all phases of emergencies). Additionally, they will coordinate community-based service providers (i.e. nonprofits, businesses, congregations, clinics, associations, individual leaders, and other nongovernmental providers) in the preparedness, response, recovery, and/or mitigation phases of emergency management. The contract term is anticipated to be for six (6) years from March 1, 2027, to February 28, 2033, with no renewal options. There will be a Pre-Proposal Conference at 1:00 P.M., ET, on June 16, 2026, via teleconference. Attendance by proposers is optional but strongly recommended by the NYC Health Department. To register for the teleconference, please RSVP for the conference by 2:00 P.M. ET on June 15, 2026, by emailing the name, title, affiliation, and email address of each attendee to RFP@health.nyc.gov. Please state \u001aCEN Leader\u001a in the subject line of the email. Proposers who submit an RSVP will be provided an invitation via email to attend the teleconference. All questions must be submitted in writing to the Authorized Agency Contact person via Discussion with Buyer tab in PASSPort, or preferably by e-mail at RFP@health.nyc.gov. Questions submitted by June 9, 2026, will be addressed at the pre-proposal teleconference. Answers to all questions received by the question deadline of June 23, 2026, will be provided in an addendum released through PASSPort. Please note that this procurement is released via PASSPort. Please d": [], "penalties": []}, {"source_type": "nyc", "source_name": "NYC City Record", "title": "Catch Basin Larviciding", "source_url": null, "external_id": "20260616014", "buyer_name": "Health and Mental Hygiene", "buyer_type": "government", "summary": "The New York City Department of Health and Mental Hygiene (\u001aNYC Health Department\u001a or the \u001aAgency\u001a) is seeking up to two (2) qualified vendors, to each furnish all labor and equipment necessary and required to conduct Mosquito Control-Catch Basin Larviciding services on an as needed basis within the five boroughs of New York City. The selected vendor(s) will conduct mosquito breeding surveys and need-based larviciding in accordance with permits issued by NYS Department of Environmental Conservation. There are currently approximately 150,000 catch basins across the City. During each season between April and October, or as determined by the NYC Health Department, all catch basins will be inspected, and if justified, treated at least once by hand application of larvicides. On an average, between 145,000 and 500,000 catch basin inspections and between 140,000 and 450,000 treatments (based on the inspection results) are conducted in the City each season.", "full_text": null, "category_raw": "Award", "location": null, "country": "United States", "posted_date": "2026-06-23", "deadline": "2026-06-23", "status": "open", "budget_min": null, "budget_max": null, "currency": null, "documents_url": [], "contact_email": null, "id": "nyc:20260616014", "content_hash": "d0b2b920d888aeb8cbed3eb5808d16707147cd70a0a62fde87a1c6a6edcf3ef3", "relevance_score": 32.0, "design_fit_score": 0.0, "sector_fit_score": 80.0, "tags": ["climate", "government"], "category_normalized": [], "penalties": []}, {"source_type": "nyc", "source_name": "NYC City Record", "title": "FY27 Neighborhood Development Areas NAQ", "source_url": null, "external_id": "20260430028", "buyer_name": "Youth and Community Development", "buyer_type": "governmen : null, "budget_max": null, "currency": null, "documents_url": [], "contact_email": null, "id": "nyc:20260430028", "content_hash": "17a4ee32a63b69d61faa8393435c2130e478884925a218682878344abda18cd8", "relevance_score": 30.0, "design_fit_score": 0.0, "sector_fit_score": 75.0, "tags": ["education", "government"], "category_normalized": [], "penalties": []}, {"source_type": "nyc", "source_name": "NYC City Record", "title": "FY26 Business Solutions Upper Manhattan/Washington Heights", "source_url": null, "external_id": "20260504007", "buyer_name": "Small Business Services", "buyer_type": "government", "summary": "NYC Business Solutions is a suite of services funded by the Federal Workforce Innovation and Opportunity Act (\u001aWIOA\u001a). The Centers help entrepreneurs and small businesses to start, operate and grow in New York City. Services are offered at no cost and can help businesses of any size and at any stage. The negotiated acquisition extension will allow the agency adequate time to solicit the new RFP, make selections, finalize negotiations and process awards for this program and enable the current Business Solutions Center (BSC) provider to continue to deliver a suite of business services in Upper Manhattan and Washington Heights that include but are not limited to financing awards, recruitment, training, business education, Minority/Women Business Enterprise certification assistance, other business service referrals including governmental resources and delivering customer service in the multiple languages to serve the diverse populations in the City. In addition to increasing businesses and entrepreneurs' knowledge and awareness of other available City programs, the Centers reinforce the City\u001as economic development efforts to support small businesses and entrepreneurs to expand, maintain and grow in the city while employing a diverse workforce. LL63 REF # FY26NSBS11", "full_text": null, "category_raw": "Award", "location": null, "country": "United States", "posted_date": "2026-05-08", "deadline": "2026-05-08", "status": "open", "budget_min": null, "budget_max": null, "currency": null, "documents_url": [], "contact_email": null, "id": "nyc:20260504007", "content_hash": "8d6958ea1aacc39d8c92ee6999ad099c0e820f91b34dd1e0f3a3064ed5f1d564", "relevance_score": 30.0, "design_fit_score": 0.0, "sector_fit_score": 75.0, "tags": ["education", "government"], "category_normalized": [], "penalties": []}, {"source_type": "nyc", "source_name": "NYC City Record", "title": "Advance and Earn Assignment to Goddard Riverside Community Center", "source_url": null, "external_id": "20260504029", "buyer_name": "Youth and Community Development", "buyer_type": "government", "summary": "In accordance with section 3-04(b)(2)(ii) of the PPB rules DYCD intends to contract with Goddard Riverside Community Center for Advance and Earn programmatic services. Advance and Earn participants are young adults 16-24 who are not in school and not working. Advance & Earn will help further their career through comprehensive High School Equivalency (HSE) test preparation, employer-recognized trainings, credentials and certifications, and paid internships. The Program will combine services that were offered through DYCD\u001as Young Adult Literacy Program (YALP) and Intern & Earn (formerly Young Adult Internship Program [YAIP]). This program offers a continuum of education and employment services from literacy instruction through advanced training and job placement or college enrollment supported by comprehensive support services tailored to individual needs. This contract was initially awarded to Stanley M Isaacs but has since been assigned to Goddard Riverside Community Center effective 5/1/2026. Stanley M Isaacs organization has merged with Goodard Riverside Community Center. The term of this contract extension shall be for period of May 1, 2026, to April 30, 2028, with no option to renew. EPIN: 26026N0006006 Contractor Name: Goddard Riverside Community Ce "buyer_type": "government", "summary": "For more information, please visit our website at www.cuny.edu/cunybuilds", "full_text": null, "category_raw": "Solicitation", "location": null, "country": "United States", "posted_date": "2026-05-15", "deadline": "2026-05-15", "status": "open", "budget_min": null, "budget_max": null, "currency": null, "documents_url": [], "contact_email": null, "id": "nyc:20260508029", "content_hash": "dd57beff81696bd9fdfd8756bd7f652366b51bf446dd8e32fe8f2c3f3f1f7212", "relevance_score": 30.0, "design_fit_score": 0.0, "sector_fit_score": 75.0, "tags": ["education", "government"], "category_normalized": [], "penalties": []}, {"source_type": "nyc", "source_name": "NYC City Record", "title": "New Best Value Request. Requirements Contract for Medical Waste Removal Services and Supplies", "source_url": null, "external_id": "20260511006", "buyer_name": "Education", "buyer_type": "government", "summary": "The New York City Department of Education (\u001aDOE\u001a) requests on behalf of the Division of the Office of Occupational Safety and Health to release a Best Value Request for Bid (RFB) seek qualifies and licensed vendors to provide comprehensive medical waste collection, transportation, and disposal services across school facilities citywide, services will support school-based health centers, and nursing offices. Detailed service descriptions and requirements are provided in the Request for Bid (RFB) solicitation. BIDS MUST BE RECEIVED BY NO LATER THAN 4:00 P.M. EST, Thursday, July 9, 2026. LATE BID SUBMISSION WILL NOT BE ACCEPTED. This RFB will result in one (1) requirement contract agreement. The awarded contract will be for a term of three (3) years with One two\u001ayear option to extend. It is anticipated that services will commence on or about September 2026. To download, please go to: https://infohub.nyced.org/in-our-schools/working-with-the-doe/contracts-and-purchasing/open-doe-solicitations/request-for-bids If you cannot download it, send an e-mail to vendorhotline@schools.nyc.gov with the RFB number and title in the subject line. For all questions related to this RFB, please e-mail HHSContracts@schools.nyc.gov with the RFB number and title in the subject line of your e-mail. Questions regarding this solicitation should be addressed to HHSContracts@schools.nyc.gov by no later than 4:00 p.m. EST, Friday, June 12, 2026 . Subsequent amendments and answers will be posted to https://vendorportal.nycenet.edu/vendorportal/login.aspx . Review this site periodically for important updates. There will be a Pre-Bid Conference on Thursday, May 28, 2026, from 1:00 PM-2:30 PM (UTC-05:00) Eastern Time (US & Canada) ., on Microsoft Teams Live. The link to the virtual Pre-Bid Conference scheduled is below : https://teams.microsoft.com/l/meetup-join/19%3ameeting_ODUwOTVmMmUtOTRjYy00NDJiLThhNTUtZGJkMTEzYTg2ZTMw%40thread.v2/0?context=%7b%22Tid%22%3a%2218492cb7-ef45-4561-8571-0c42e5f7ac07%22%2c%22Oid%22%3a%223cd00e19-9333-421f-8cfe-a026e1f17a1a%22%7d We recommend that Bidders download the free Microsoft Teams Application on their computer and/or mobile device to participate in the Teams Live Event in advance of the conference and attendees should plan to log in 5 minutes prior to the conference start time. For electronic Bid submissions, please note the following procedures: Bid submissions can be sent via electronic mail (\u001aThe Bid Submission Email\u001a) to DCPSubmissions@schools.nyc.gov (the \u001aBid Submission Email Address\u001a). Bid Submissions sent to any other email address will be disregarded. The subject line of your Bid Submission Email must include the solicitation number and the name of the submitting vendor (e.g., B5999 \u001a Enter Company Name). Please attach the completed Request for Bid, signed, and the Bid Blank documents to the Bid Submission Email as separate files. Please name the Bid Blank Form attachment \u001aBid Blank\u001a and the completed Request for Bid attachment \u001aRFB.\u001a If the files accompanying your Bid submission are too large to be transmitted as email attachments, please include in the first line of your Bid Submission Email a link to a Microsoft OneDrive folder containing all of your Bid-related documents. Please note that if you are using OneDrive, do not attach any documents to the Bid Submission Email. Further, please include a separate folder within your OneDrive folder which includes the separate Bid Blank file. Please name this folder and the Bid Blank file \u001aBid Blank.\u001a The name of your OneDrive folder must match the subject line of your Bid submission, and your OneDrive folder must not contain any files unrelated to the Bid Submission. Guidance for first-time Microsoft One-Drive Users: Microsoft OneDrive (\u001aOneDrive\u001a) is a file hosting and synchronization service operated by Microsoft as part of its web version of Microsoft Office. OneDrive allows users to grant access to files which are too large to transmit via electronic mail to other users. If you do not have Office 365, please take the following steps to gain access to a free version of OneDrive so that you can upload those Bid submission documents which are too large to transmit via electronic mail: 1. Conduct an internet search for \u001aMicrosoft OneDrive;\u001a 2. Navigate to the official Microsoft website and sign up for a free account; 3. Once you have created a folder for the solicitation whose name matches the subject line of your Bid Submission Email, upload the documents relevant to your Bid submission in this folder. 4. Create a share link for this folder; 5. Be sure to check your share settings so that anyone receiving the link that you create will be able to open the link and access the files. If your share link permissions are restricted (e.g. to only your organization in Office 365), the DOE will not be able to view your solicitation documents. It is your responsibility to ensure that the link(s) you provide allows the DOE to view, download, and/or open your documents; and 6. Include the link which you have created as the first line of your Bid Submission Email. For hard copy (paper) Bid submissions, please follow the instructions below: Further to prior instructions regarding submissions of the bid. In addition to electronic submission via email, the Bidder may choose to hand deliver their Bid packages to NYC DOE at any time prior to the Bid Due Date/Time if you plan to submit a paper Bid. You must provide notice by emailing DCPSubmissions@schools.nyc.gov, including \u001aPaper Submission Request for Solicitation # B5999\u001a in the subject line, at least three (3) business days in advance of the anticipated date and time and place you or your agent plan to arrive at 65 Court Street, Brooklyn, NY 11201, Rm 1201 to drop off your Bid. Bidders should include in their notification e-mail the name of the person who will be delivering the Bid submission or advise that the Bid Package will be arriving by messenger. Bidder who fail to provide advance notification of intent to hand-deliver a Bid risk not having anyone to receive the Bid Package. FedEx, UPS, USPS, or other common deliveries services will be accepted. Please continue to check the DOE website and/or Vendor Portal for updates. https://infohub.nyced.org/vendors https://www.finance360.org/vendor/vendorportal/ The Bid opening will be held on Friday, July 10, 2026 at 11:00 AM EST . See Virtual Link below: https://teams.microsoft.com/l/meetup-join/19%3ameeting_MzgzZTJjYmYtZDkzMy00OGEyLWExNDItOTVlYjg4ZDgyODU4%40thread.v2/0?context=%7b%22Tid%22%3a%2218492cb7-ef45-4561-8571-0c42e5f7ac07%22%2c%22Oid%22%3a%2233f73cb2-8a8c-4d65-8f37-5256f643d9ed%22%7d", "full_text": null, "category_raw": "Solicitation", "location": null, "country": "United States", "posted_date": "2026-05-18", "deadline": "2026-05-18", "status": "open", "budget_min": null, "budget_max": null, "currency": null, "documents_url": [], "contact_email": null, "id": "nyc:20260511006", "con "2026-05-22", "deadline": "2026-05-22", "status": "open", "budget_min": null, "budget_max": null, "currency": null, "documents_url": [], "contact_email": null, "id": "nyc:20260515014", "content_hash": "22486864a82d1fa860b9f29e5d7aede3f8feaa93aacd4241f3d92c438d03bd5e", "relevance_score": 30.0, "design_fit_score": 0.0, "sector_fit_score": 75.0, "tags": ["education", "government"], "category_normalized": [], "penalties": []}, {"source_type": "nyc", "source_name": "NYC City Record", "title": "FY24 Discretionary award to support LGBTQ Inclusive Programs", "source_url": null, "external_id": "20260518021", "buyer_name": "Education", "buyer_type": "government", "summary": "This allocation will fund the DOE\u001as effort to support the needs of LGBTQ youth and address the intersectionality of race sexual orientation and gender identity through DOE\u001as general curriculum. This funding will support professional development for public school teachers as well as integrating LGBTQ inclusive curriculum into literacy and history classes.; This allocation will fund the DOE's effort to support the needs of LGBTQ youth and address the intersectionality of race sexual orientation and gender identity through DOE's general curriculum. This funding will support professional development for public school teachers as well as integrating LGBTQ inclusive curriculum into literacy and history classes.", "full_text": null, "category_raw": "Award", "location": null, "country": "United States", "posted_date": "2026-05-22", "deadline": "2026-05-22", "status": "open", "budget_min": null, "budget_max": null, "currency": null, "documents_url": [], "contact_email": null, "id": "nyc:20260518021", "content_hash": "eace6f005c8f2ef1006966794aeed16bb8a630c3de97f59b11c2e8c3948b25d8", "relevance_score": 30.0, "design_fit_score": 0.0, "sector_fit_score": 75.0, "tags": ["education", "government"], "category_normalized": [], "penalties": []}, {"source_type": "nyc", "source_name": "NYC City Record", "title": "Requirements Contracts for Postsecondary Pathways Programs", "source_url": null, "external_id": "20260515016", "buyer_name": "Education", "buyer_type": "government", "summary": "The New York City Public Schools (NYC DOE), on behalf of the Office of Student Pathways, is seeking proposals from qualified and experienced organizations capable of providing early college credit opportunities, industry-recognized credentialing programs, or research/impact services. This solicitation comprises three (3) distinct service components. Vendors may submit proposals for Component 1, Component 2, and Component 3, or All Components. Component 1: Early College Credit Opportunities and Programs. Component 2: Industry-Recognized Credentialing Opportunities and Programs. Component 3: Career-Connected Learning Support and Impact Services. Notes: Vendors may elect to submit proposals for one, two, three, or all components, subject to the conditions noted above. The requested services are limited to non-public entities nationwide or public institutions of higher education located outside of New York State. This is an open-ended RFP (to remain open indefinitely). PROPOSALS MUST BE RECEIVED BY NO LATER THAN 1:00 P.M. EST, Tuesday, August 18, 2026. LATE PROPOSALS WILL NOT BE ACCEPTED. This RFP may result in multiple Requirements contract agreements. The awarded contract will be for a term of three (3) years with two two\u001ayear options to extend. It is anticipated that services will commence on or about July 2027. To download, please go to: https://infohub.nyced.org/working-with-the-doe/vendors/open-doe-solicitations/request-for-proposals. If you cannot download it, send an e-mail to vendorhotline@schools.nyc.gov with the RFP number and title in the subject line. For all questions related to this RFP, please e-mail HHSContracts@schools.nyc.gov with the RFP number and title in the subject line of your e-mail. Questions regarding this solicitation must be addressed only to HHSContracts@schools.nyc.gov by no later than 4:00 p.m. EST, Friday, June 26, 2026. Subsequent amendments and answers will be posted to https://vendorportal.nycenet.edu/vendorportal/login.aspx. Review this site periodically for important updates . There will be a Pre-proposal Conference on Wednesday, June 10, 2026, from 1:30 P.M. to 3:00 P.M. Eastern Time on Microsoft Teams Live. The link to the virtual Pre-Proposal Conference scheduled is below: https://events.teams.microsoft.com/event/d5eace46-fbf3-4860-80c9-b0c759b8cd26@18492cb7-ef45-4561-8571-0c42e5f7ac07 We recommend that proposers download the free Microsoft Teams Application on their computer and/or mobile device to participate in the Teams Live Event in advance of the conference, and attendees should plan to log in 5 minutes prior to the conference start time. For electronic Proposal submissions, please note the following procedures: Proposal submissions may be sent via electronic mail (the \u001aProposal Submission Email\u001a) to DCPSubmissions@schools.nyc.gov (the \u001aProposal Submission Email Address\u001a). Proposal submissions sent to any other email address will not be considered. The subject line of the Proposal Submission Email must include the solicitation number and the name of the submitting vendor (e.g., R1875 \u001a [Enter Company Name]. Please attach the completed Request for Proposal, Appendix F, and Appendix G documents to the Proposal Submission Email as separate files. The Appendix F file must be named \u001aPricing Form,\u001a Appendix G must be named \u001aCost Budget Summary,\u001a and the completed Request for Proposal must be named \u001aRFP.\u001a If the files accompanying your proposal submission are too large to be sent as email attachments, please include, in the first line of your Proposal Submission Email, a link to a Microsoft OneDrive folder containing all proposal-related documents. When using OneDrive, do not attach any documents to the Proposal Submission Email. Within your OneDrive folder, please include a separate subfolder containing Appendix F and Appendix G. This subfolder, as well as the Appendix F \u001a Pricing Form file, must be labeled: \u001aAppendix G \u001a Cost Budget Summary.\u001a The name of your OneDrive folder must match the subject line of your Proposal Submission Email. Additionally, the OneDrive folder must not contain any files unrelated to the proposal submission. Guidance for first-time Microsoft One-Drive Users: Microsoft OneDrive (\u001aOneDrive\u001a) is a file hosting and synchronization service operated by Microsoft as part of its web version of Microsoft Office. OneDrive allows users to grant access to files which are too large to transmit via electronic mail to other users. If you do not have Office 365, please take the following steps to gain access to a free version of OneDrive so that you can upload those proposal submission documents which are too large to transmit via electronic mail: 1. Conduct an internet search for \u001aMicrosoft OneDrive;\u001a 2. Navigate to the official Microsoft website and sign up for a free account; 3. Once you have created a folder for the solicitation whose name matches the subject line of your Proposal Submission Email, upload the documents relevant to your proposal submission in this folder. 4. Create a share link for this folder; 5. Be sure to check your share settings so that anyone receiving the link that you create will be able to open the link and access the files. If your share link permissions are restricted (e.g. to only your organization in Office 365), the DOE will not be able to view your solicitation documents. It is your responsibility to ensure that the link(s) you provide allows the DOE to view, download, and/or open your documents; and 6. Include the link which you have created as the first line of your proposal Submission Email. For hard copy (paper) Proposal submissions, please follow the instructions below: Further to prior instructions regarding submissions of Proposals. In addition to electronic submission via email, the proposer may choose to hand deliver their Proposal packages to NYC DOE at any time prior to the Proposal Due Date/Time if you plan to submit a paper Proposal. You must provide notice by emailing DCPSubmissions@schools.nyc.gov, including \u001aPaper Submission Request for Solicitation # R1875\u001a in the subject line, at least three (3) business days in advance of the anticipated date and time and place you or your agent plan to arrive at 65 Court Street, Brooklyn, NY 11201, Rm 1201 to drop off your Proposal. Proposers should include in their notification e-mail the name of the person who will be delivering the Proposal or advise that the Proposal Package will be arriving by messenger. Proposers who fail to provide advance notification of intent to hand-deliver a proposal risk not having anyone to receive the Proposal Package. FedEx, UPS, USPS, or other common deliveries services will be accepted. The proposal opening will be held on Wednesday, August 19, 2026 . (This is an internal opening only; no public allowed). Please continue to check the DOE website and/or Vendor Portal for updates. https://infohub.nyced.org/vendors https://www.finance360.org/vendor/vendorportal/", "full_text": null, "category_raw": "Solicitation", "location": null, "country": "United States", "posted_date": "2026-05-22", "deadline": "2026-05-22", "status": "open", "budget_min": null, "budget_max": null, "currency": null, "documents_url": [], "contact_email": null, "id": "nyc:20260515016", "content_hash": "6704204df8db23b8ddafa4ddb08d44c9fbd1a67f5d7151d45160c51c442806b6", "relevance_score": 30.0, "design_fit_score": 0.0, "sector_fit_score": 75.0, "tags": ["education", "government"], "category_normalized": [], "penalties": []}, {"source_type": "nyc", "source_name": "NYC City Record", "title": "X-Ray Systems for NYPD School Safety Division - NYPD-OGS", "source_url": null, "external_id": "20260521007", "buyer_name": "Citywide Administra r up to 24 weeks, with 3 months of follow-up services, including job placement, after completing training. In addition, participants will have access to a myriad of supportive services throughout the program, including mental health counseling and connections to social services, resources, and benefits that would enable them to successfully engage in the program activities (e.g., housing, life coaching, academic support, legal support, access to healthcare, etc.). The goal of the program is to provide pathways to employment and economic mobility for people who reside in communities where community violence is most prevalent, including neighborhoods identified as priority areas by the Gun Violence Prevention Taskforce. Community violence compounds neighborhood and racial income inequality by curtailing economic activity and development in neighborhoods where it is common, reducing home values, job opportunities, and access to capital to develop new ventures", "full_text": null, "category_raw": "Award", "location": null, "country": "United States", "posted_date": "2026-06-08", "deadline": "2026-06-08", "status": "open", "budget_min": null, "budget_max": null, "currency": null, "documents_url": [], "contact_email": null, "id": "nyc:20260602019", "content_hash": "6480310cc2992ea6167b98d221fedbda2a32b276136c22eae8a3a358a0f792d9", "relevance_score": 30.0, "design_fit_score": 0.0, "sector_fit_score": 75.0, "tags": ["education", "government"], "category_normalized": [], "penalties": []}, {"source_type": "nyc", "source_name": "NYC City Record", "title": "FY27 Beacon Program NAE", "source_url": null, "external_id": "20260603016", "buyer_name": "Youth and Community Development", "buyer_type": "government", "summary": "DYCD\u001as Beacon programs are collaborative, school-based community centers designed to provide quality services to youth and adults after school, in the evenings, and on weekends. The Beacons represent a unique convergence of youth and community development, through an integrated range of services, provided in an educational environment, and tailored to local needs.", "full_text": null, "category_raw": "Award", "location": null, "country": "United States", "posted_date": "2026-06-09", "deadline": "2026-06-09", "status": "open", "budget_min": null, "budget_max": null, "currency": null, "documents_url": [], "contact_email": null, "id": "nyc:20260603016", "content_hash": "499f1b7a34a5beb07bfef5f4dbee73bb01ba065b16ed36ebea4f3a3cf2554648", "relevance_score": 30.0, "design_fit_score": 0.0, "sector_fit_score": 75.0, "tags": ["education", "government"], "category_normalized": [], "penalties": []}, {"source_type": "nyc", "source_name": "NYC City Record", "title": "FY27 Renewal - Internship Placement Services", "source_url": null, "external_id": "20260604035", "buyer_name": "Dept. of Social Svcs/Human Resources Administration", "buyer_type": "government", "summary": "The Internship Placement Services (IPS) Program is a comprehensive approach to employment services which recognizes the needs of individual Cash Assistance (CA) clients who are enrolled in an HRA-approved course of study and choose to participate in the internship as part of their education program and provide additional support that consist of a combination of services, including assessments; services coordination, internship placement, and employment to clients as they complete their education and training and transition them into sustainable, unsubsidized employment that is aligned with their field of study. The goal is to assist each CA client in entering or returning to the workforce to build sustainable careers that will lead to self-sufficiency. We are also increasing the number of subsidized internships. Contract award shall be subject to the timely completion of contract negotiations between the Agency and the provider. The continued need for the Internship Placement Services (IPS) is required in order to reduce the number of clients receiving assistance and provide quality services to youth and adults after school, in the evenings, and on weekends. The Beacons represent a unique convergence of youth and community development, through an integrated range of services, provided in an educational environment, and tailored to local needs. Beacons were introduced in response to widespread concern about crime and drugs in New York City and since their inception, Beacon centers have served more than one million youth and adults. Notably, they shifted the focus away from \u001aproblems\u001a and \u001adeficits\u001a to create a flagship program for positive youth development. Beacon programs provide services in the following core areas: Education, Community Building/Leadership, Health, Employment and Financial Security, Recreation and Enrichment. The term of the extension will be from July 1, 2026, to June 30, 2029, with no option to renew. The contractor PINS, contractor names, contractor addresses and contractor amounts are listed below. Agency PIN: 99319C Contractor Name: Goddard Riverside Community Center Contractor Address: 593 Columbus Avenue, New York, NY 10024 Contract Amount: $8,110,834.00 Please be advised that this ad is for informational purposes only. If you wish to contact DYCD for further information, or to express interest in future procurements, please send an e-mail to ACCO@dycd.nyc.gov.", "full_text": null, "category_raw": "Intent to Award", "location": null, "country": "United States", "posted_date": "2026-06-11", "deadline": "2026-06-11", "status": "open", "budget_min": null, "budget_max": null, "currency": null, "documents_url": [], "contact_email": null, "id": "nyc:20260605042", "content_hash": "f48ad658902298de78abb21676c7a1ed8578c8ff7419f9db607c1d401d932537", "relevance_score": 30.0, "design_fit_score": 0.0, "sector_fit_score": 75.0, "tags": ["education", "government"], "category_normalized": [], "penalties": []}, {"source_type": "nyc", "source_name": "NYC City Record", "title": "FY27 Beacon Program NAE u001a BERS \u001a) may choose to participate at a later date) (collectively \u001a NYCRS \u001a or the \u001a Systems ), is conducting this investment manager search (this \u001aSearch\u001a ) to identify and select Equity Index Investment Management Products and Services, including capitalization weighted indexes, smart beta/alternatively weighted indexes, or any other type of indexes portfolio, including but not limited to those based on ESG factors and limits on carbon. How to Participate in this Search: To be considered, investment management firms must comply with the requirements (1) \u001a (3) listed below: All firms shall carefully review the Notice of Search and the Minimum Requirements described in Section III(B) of the Investment Manager Notice of Search. Interested Firms that meet the Minimum Requirements must enter their information in the following databases to be considered by each of the Investment Consultants. The Investment Consultants will review the databases and provide BAM with a written report identifying the Firms that meet the Minimum Requirements. For Callan, Firms must submit their information directly to the Investment Consultant\u001as database (CallanDNA). Information on requirements for entering information into these databases can be found at http://www.callan.com (click on \u001aFor Investment Managers & Advisors>Investment Manager\u001a). In addition, for Callan, managers are requested to email nycers@callan.com to confirm (1) their interest in this search and (2) for what specific product(s). In the subject line please use \u001aEquity Index Manager Search.\u001a For Wilshire, Firms must submit their information directly to the Investment Consultant\u001as database (Wilshire Compass). Information on requirements for entering information into these databases can be found at: compassportal.wilshire.com. All inquiries to Wilshire are to be sent to investmentsearch@wilshire.com . For Goldman Sachs Rocaton, NEPC and Segal Marco Advisors, Firms must enter their information into eVestment Alliance\u001as database. Information on requirements for entering information into these databases can be found at https://www.evestment.com (click on \u001aSubmit My Data\u001a). All firms must ensure that they completely identify their firm and product information in the aforementioned databases. Additionally, firms must ensure that the information (such as organization, product, returns, portfolio characteristics and AUM data) is current and accurate as of March 31, 2026. There is no fee for entering information into the aforementioned databases. Firms are advised that information in the database may become part of any pool contract that results from this Search. Current and accurate data must be in the aforementioned databases by the deadline stated in Section I of this Notice of Search , at which time the respective Investment Consultant shall commence its review of the database. Consistent with the policies expressed by the City of New York, participation by minority-owned and women-owned businesses or partnering arrangements with minority-owned and women-owned investment firms are encouraged. Additionally, participation by small and New York City-based businesses is also encouraged. The Notice of Search which fully describes the scope of the search, minimum requirements, how to participate and the evaluation process will be available for download from the Comptroller\u001as website, www.comptroller.nyc.gov , on or about June 12, 2026 . To download the Notice of Search, from the Comptroller\u001as website, select \u001aRFPs & Solicitations\u001a then \u001aNotice of Search for \u001aEquity Index Investment Management Products and Services\u001a and complete the form. Questions about the Notice of Search should be transmitted by e-mail to Samantha Bobb, Deputy Director of Contracts at EquitySearch2026@comptroller.nyc.gov by June 25, 2026 by 3:00 PM EST .", "full_text": null, "category_raw": "Solicitation", "l const STATUSES = ["new","reviewing","maybe","pitched","submitted","won","lost","ignored"];
const DEADLINE_WINDOWS = [["Any",null],["7d",7],["14d",14],["30d",30],["60d",60]];
const STORAGE_KEY = "worktube.state.v1";

let userState = {};
try { userState = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch (e) { userState = {}; }
function persist() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(userState)); } catch (e) {} }
function stateFor(id) { return userState[id] || { saved: false, status: "new", notes: "" }; }
function setState(id, patch) { userState[id] = Object.assign(stateFor(id), patch); persist(); }

const filters = { q: "", minScore: 0, deadline: null, savedOnly: false, sources: new Set(), buyers: new Set(), tags: new Set(), sort: "relevance" };

function titleCase(s) { return (s || "").replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase()); }
function esc(s) { return (s == null ? "" : String(s)).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c])); }
function daysUntil(iso) { if (!iso) return null; const d = new Date(iso + "T00:00:00"); if (isNaN(d)) return null; return Math.round((d - new Date().setHours(0,0,0,0)) / 86400000); }
function deadlineLabel(iso) { const n = daysUntil(iso); if (n === null) return "No deadline"; if (n < 0) return "Closed"; if (n === 0) return "Due today"; if (n === 1) return "1 day left"; return n + " days left"; }
function scoreClass(s) { return s >= 70 ? "s-hi" : s >= 40 ? "s-mid" : "s-lo"; }
function uniq(arr) { return Array.from(new Set(arr)); }

function copyText(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) { navigator.clipboard.writeText(text).catch(fallbackCopy.bind(null, text)); }
  else fallbackCopy(text);
}
function fallbackCopy(text) {
  const ta = document.createElement("textarea"); ta.value = text; document.body.appendChild(ta);
  ta.select(); try { document.execCommand("copy"); } catch (e) {} document.body.removeChild(ta);
}

function buildHeader() {
  const d = new Date(REPORT.generated_at);
  const when = isNaN(d) ? REPORT.generated_at : d.toLocaleString();
  const hi = REPORT.opportunities.filter(o => o.relevance_score >= REPORT.high_fit_threshold).length;
  document.getElementById("subhead").textContent =
    `Generated ${when} · ${REPORT.opportunities.length} opportunities · ${hi} high-fit (≥${REPORT.high_fit_threshold})`;

  const banners = document.getElementById("banners");
  if (REPORT.demo) banners.innerHTML += `<div class="banner">Showing <strong>sample/demo data</strong>. Set a SAM_API_KEY and re-run to pull live opportunities.</div>`;
  (REPORT.warnings || []).forEach(w => { banners.innerHTML += `<div class="banner">${esc(w)}</div>`; });
}

function buildSourceStatus() {
  const el = document.getElementById("sourceStatus");
  const sources = REPORT.sources || [];
  if (!sources.length) { el.innerHTML = '<div class="srcstat"><span class="nm" style="color:#94a3b8">No sources</span></div>'; return; }
  const ICON = { ok: ["✓", "ok"], failed: ["✕", "fail"], skipped: ["○", "skip"] };
  el.innerHTML = sources.map(s => {
    const [glyph, cls] = ICON[s.status] || ["○", "skip"];
    const right = s.status === "ok" ? (s.count + "") : titleCase(s.status);
    const tip = s.message ? ` title="${esc(s.message)}"` : "";
    return `<div class="srcstat"${tip}>
      <span class="ico ${cls}">${glyph}</span>
      <span class="nm">${esc(s.name)}</span>
      <span class="ct">${esc(right)}</span>
    </div>`;
  }).join("");
}

function buildControls() {
  const pills = document.getElementById("deadlinePills");
  DEADLINE_WINDOWS.forEach(([label, val]) => {
    const b = document.createElement("button"); b.className = "pill" + (val === null ? " active" : ""); b.textContent = label;
    b.onclick = () => { filters.deadline = val; [...pills.children].forEach(c => c.classList.remove("active")); b.classList.add("active"); render(); };
    pills.appendChild(b);
  });

  checkGroup("sourceChecks", uniq(REPORT.opportunities.map(o => o.source_type)).sort(), filters.sources);
  checkGroup("buyerChecks", uniq(REPORT.opportunities.map(o => o.buyer_type).filter(Boolean)).sort(), filters.buyers);
  checkGroup("tagChecks", uniq(REPORT.opportunities.flatMap(o => o.tags || [])).sort(), filters.tags);

  document.getElementById("q").oninput = e => { filters.q = e.target.value.toLowerCase(); render(); };
  const ms = document.getElementById("minScore");
  ms.oninput = e => { filters.minScore = +e.target.value; document.getElementById("scoreVal").textContent = e.target.value; render(); };
  document.getElementById("savedOnly").onchange = e => { filters.savedOnly = e.target.checked; render(); };
  document.getElementById("sort").onchange = e => { filters.sort = e.target.value; render(); };
  document.getElementById("clearBtn").onclick = clearFilters;
}

function checkGroup(elId, values, set) {
  const el = document.getElementById(elId);
  if (!values.length) { el.parentElement.style.display = "none"; return; }
  el.innerHTML = "";
  values.forEach(v => {
    const id = elId + "-" + v;
    const label = document.createElement("label");
    label.innerHTML = `<input type="checkbox" id="${esc(id)}" /> ${esc(titleCase(v))}`;
    label.querySelector("input").onchange = e => { e.target.checked ? set.add(v) : set.delete(v); render(); };
    el.appendChild(label);
  });
}

function clearFilters() {
  filters.q = ""; filters.minScore = 0; filters.deadline = null; filters.savedOnly = false;
  filters.sources.clear(); filters.buyers.clear(); filters.tags.clear();
  document.getElementById("q").value = ""; document.getElementById("minScore").value = 0;
  document.getElementById("scoreVal").textContent = "0"; document.getElementById("savedOnly").checked = false;
  document.querySelectorAll(".checks input").forEach(c => c.checked = false);
  const pills = document.getElementById("deadlinePills"); [...pills.children].forEach((c,i) => c.classList.toggle("active", i === 0));
  render();
}

function matches(o) {
  const st = stateFor(o.id);
  if (filters.savedOnly && !st.saved) return false;
  if (o.relevance_score < filters.minScore) return false;
  if (filters.sources.size && !filters.sources.has(o.source_type)) return false;
  if (filters.buyers.size && !filters.buyers.has(o.buyer_type)) return false;
  if (filters.tags.size && !(o.tags || []).some(t => filters.tags.has(t))) return false;
  if (filters.deadline !== null) { const n = daysUntil(o.deadline); if (n === null || n < 0 || n > filters.deadline) return false; }
  if (filters.q) { const hay = (o.title + " " + (o.summary || "")).toLowerCase(); if (!hay.includes(filters.q)) return false; }
  return true;
}

function sortRows(rows) {
  const by = filters.sort;
  return rows.slice().sort((a, b) => {
    if (by === "deadline") return (a.deadline || "9999") < (b.deadline || "9999") ? -1 : 1;
    if (by === "design") return b.design_fit_score - a.design_fit_score;
    return b.relevance_score - a.relevance_score;
  });
}

function cardHTML(o) {
  const st = stateFor(o.id);
  const urgent = (() => { const n = daysUntil(o.deadline); return n !== null && n >= 0 && n <= 14; })();
  const tags = (o.tags || []).slice(0, 8).map(t => `<span class="tag">${esc(titleCase(t))}</span>`).join("");
  const opts = STATUSES.map(s => `<option value="${s}"${s === st.status ? " selected" : ""}>${titleCase(s)}</option>`).join("");
  const link = o.source_url ? `<a href="${esc(o.source_url)}" target="_blank" rel="noreferrer">Open source ↗</a>` : "";
  return `<article class="card" data-id="${esc(o.id)}">
    <div class="top">
      <div style="flex:1;min-width:0">
        <div class="meta">
          <span class="score ${scoreClass(o.relevance_score)}">${Math.round(o.relevance_score)}<span class="lbl">fit</span></span>
          <span class="score ${scoreClass(o.design_fit_score)}">${Math.round(o.design_fit_score)}<span class="lbl">design</span></span>
          <span class="src">${esc(o.source_name)}</span>
        </div>
        <h3>${o.source_url ? `<a href="${esc(o.source_url)}" target="_blank" rel="noreferrer">${esc(o.title)}</a>` : esc(o.title)}</h3>
        <div class="who">${esc(o.buyer_name || "Unknown buyer")}${o.buyer_type ? " · " + esc(titleCase(o.buyer_type)) : ""}${o.country ? " · " + esc(o.country) : ""}</div>
        ${o.summary ? `<div class="summary">${esc(o.summary)}</div>` : ""}
        ${tags ? `<div class="tags">${tags}</div>` : ""}
        <div class="linkrow">
          ${link}
          <a href="#" data-act="notes">Notes${st.notes ? " ●" : ""}</a>
          <a href="#" data-act="copy">Copy summary</a>
        </div>
        <div class="notes"><textarea rows="3" data-act="notebox" placeholder="Internal notes…">${esc(st.notes)}</textarea></div>
      </div>
      <div class="side">
        <span class="deadline${urgent ? " urgent" : ""}">${deadlineLabel(o.deadline)}</span>
        <button class="act${st.saved ? " saved" : ""}" data-act="save">${st.saved ? "★ Saved" : "☆ Save"}</button>
        <select data-act="status">${opts}</select>
      </div>
    </div>
  </article>`;
}

function render() {
  const rows = sortRows(REPORT.opportunities.filter(matches));
  document.getElementById("resultCount").textContent = rows.length + " match";
  const list = document.getElementById("list");
  list.innerHTML = rows.length ? rows.map(cardHTML).join("") : `<div class="empty">No opportunities match these filters.</div>`;
}

function byId(id) { return REPORT.opportunities.find(o => o.id === id); }

document.getElementById("list").addEventListener("click", e => {
  const card = e.target.closest(".card"); if (!card) return;
  const id = card.dataset.id; const act = e.target.dataset.act;
  if (act === "save") { e.preventDefault(); setState(id, { saved: !stateFor(id).saved }); render(); }
  else if (act === "notes") { e.preventDefault(); card.querySelector(".notes").classList.toggle("open"); }
  else if (act === "copy") {
    e.preventDefault(); const o = byId(id);
    copyText([o.title, o.buyer_name ? "Buyer: " + o.buyer_name : "", o.deadline ? "Deadline: " + o.deadline : "", o.source_url || "", "", o.summary || ""].filter(Boolean).join("\n"));
    e.target.textContent = "Copied!"; setTimeout(() => { e.target.textContent = "Copy summary"; }, 1200);
  }
});
document.getElementById("list").addEventListener("change", e => {
  const card = e.target.closest(".card"); if (!card) return;
  const id = card.dataset.id; const act = e.target.dataset.act;
  if (act === "status") setState(id, { status: e.target.value });
  else if (act === "notebox") setState(id, { notes: e.target.value });
});

buildHeader(); buildSourceStatus(); buildControls(); render();
</script>
</body>
</html>
